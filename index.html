<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trading Recommendations</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f172a; color: #e2e8f0;
    padding: 1.5rem;
    font-size: 14px;
  }
  h1 { font-size: 1.4rem; font-weight: 700; color: #f8fafc; margin-bottom: 0.5rem; }
  .nav {
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .nav label { color: #94a3b8; font-size: 0.85rem; }
  .nav select {
    background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
    border-radius: 0.375rem; padding: 0.3rem 0.6rem;
    font-size: 0.85rem; cursor: pointer;
  }
  .meta { color: #64748b; font-size: 0.85rem; margin-bottom: 2rem; }
  h2 {
    font-size: 0.95rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: #94a3b8;
    margin: 1.5rem 0 0.6rem;
  }
  .badge {
    display: inline-block; padding: 0.1rem 0.5rem;
    border-radius: 9999px; font-size: 0.75rem; font-weight: 600;
  }
  .badge-buy  { background:#166534; color:#bbf7d0; }
  .badge-sell { background:#7f1d1d; color:#fecaca; }
  .badge-hold { background:#1e3a5f; color:#bfdbfe; }
  .badge-adj  { background:#4a1d96; color:#e9d5ff; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 0.5rem; }
  th {
    text-align: left; padding: 0.5rem 0.75rem;
    background: #1e293b; color: #94a3b8;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em;
    border-bottom: 1px solid #334155;
  }
  td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #1e293b; }
  tr:hover td { background: #1e293b; }
  .ticker { font-weight: 700; color: #f1f5f9; font-size: 1rem; }
  .strategy { color: #64748b; font-size: 0.8rem; }
  .pos { color: #4ade80; }
  .neg { color: #f87171; }
  .empty { color: #475569; font-style: italic; padding: 1rem 0; }
  .footer { color: #334155; font-size: 0.75rem; margin-top: 2rem; }
  #content { min-height: 200px; }
</style>
</head>
<body>
<h1>Trading Recommendations</h1>

<div class="nav">
  <label for="date-picker">Date:</label>
  <select id="date-picker" onchange="loadDate(this.value)"></select>
</div>

<div id="content"><p class="empty">Loading…</p></div>

<p class="footer">Generated by my_bot &middot; Data from Yahoo Finance &middot; Not financial advice</p>

<script>
function pct(v, d) {
  d = d === undefined ? 2 : d;
  return (v >= 0 ? '+' : '') + v.toFixed(d) + '%';
}
function price(v) { return '$' + v.toFixed(2); }
function rr(entry, stop, target) {
  var risk = Math.abs(entry - stop), reward = Math.abs(target - entry);
  return risk === 0 ? '—' : (reward / risk).toFixed(1) + '×';
}
function stopPct(e, s)  { return e === 0 ? '—' : pct((s - e) / e * 100); }
function tgtPct(e, t)   { return e === 0 ? '—' : pct((t - e) / e * 100); }
function confBar(c) {
  var filled = Math.round(c * 10);
  var color = c >= 0.7 ? '#22c55e' : c >= 0.5 ? '#f59e0b' : '#ef4444';
  var bar = '<span style="color:' + color + '">'
    + '█'.repeat(filled) + '░'.repeat(10 - filled) + '</span>';
  return bar + ' ' + Math.round(c * 100) + '%';
}
function tk(s)  { return '<span class="ticker">' + s + '</span>'; }
function str(s) { return '<span class="strategy">' + s + '</span>'; }

function buyTable(sigs) {
  if (!sigs || !sigs.length) return '';
  var hdr = '<tr><th>Ticker</th><th>Strategy</th><th>Entry</th><th>Stop</th>'
    + '<th>Target</th><th>Stop %</th><th>Target %</th><th>R:R</th><th>Confidence</th></tr>';
  return hdr + sigs.map(function(s) {
    var e = s.entry_price, sl = s.stop_loss, tp = s.take_profit;
    return '<tr>'
      + '<td>' + tk(s.ticker) + '</td><td>' + str(s.strategy) + '</td>'
      + '<td>' + price(e) + '</td>'
      + '<td class="neg">' + price(sl) + '</td>'
      + '<td class="pos">' + price(tp) + '</td>'
      + '<td class="neg">' + stopPct(e, sl) + '</td>'
      + '<td class="pos">' + tgtPct(e, tp) + '</td>'
      + '<td>' + rr(e, sl, tp) + '</td>'
      + '<td>' + confBar(s.confidence) + '</td>'
      + '</tr>';
  }).join('');
}

function sellTable(evts) {
  if (!evts || !evts.length) return '';
  var hdr = '<tr><th>Ticker</th><th>Strategy</th><th>Entry</th><th>Exit</th>'
    + '<th>P&amp;L</th><th>Bars</th><th>Reason</th></tr>';
  return hdr + evts.map(function(e) {
    var cls = e.pnl_pct >= 0 ? 'pos' : 'neg';
    return '<tr>'
      + '<td>' + tk(e.ticker) + '</td><td>' + str(e.strategy) + '</td>'
      + '<td>' + price(e.entry_price) + '</td>'
      + '<td>' + price(e.exit_price) + '</td>'
      + '<td class="' + cls + '">' + pct(e.pnl_pct) + '</td>'
      + '<td>' + e.bars_in_trade + '</td>'
      + '<td>' + e.exit_reason + '</td>'
      + '</tr>';
  }).join('');
}

function holdTable(evts) {
  if (!evts || !evts.length) return '';
  var hdr = '<tr><th>Ticker</th><th>Strategy</th><th>Entry</th><th>Current</th>'
    + '<th>Stop</th><th>Target</th><th>Unrealized</th><th>Bars</th></tr>';
  return hdr + evts.map(function(e) {
    var cls = e.unrealized_pct >= 0 ? 'pos' : 'neg';
    return '<tr>'
      + '<td>' + tk(e.ticker) + '</td><td>' + str(e.strategy) + '</td>'
      + '<td>' + price(e.entry_price) + '</td>'
      + '<td>' + price(e.current_price) + '</td>'
      + '<td class="neg">' + price(e.current_stop) + '</td>'
      + '<td class="pos">' + price(e.take_profit) + '</td>'
      + '<td class="' + cls + '">' + pct(e.unrealized_pct) + '</td>'
      + '<td>' + e.bars_in_trade + '</td>'
      + '</tr>';
  }).join('');
}

function section(title, rows) {
  if (!rows) return '<h2>' + title + '</h2><p class="empty">None</p>';
  return '<h2>' + title + '</h2><table>' + rows + '</table>';
}

function renderData(data) {
  var buys    = data.buy         || [];
  var sells   = data.sell        || [];
  var adjusts = data.adjust_stop || [];
  var holds   = data.hold        || [];

  var gen = data.generated_at || 'unknown';
  try {
    var d = new Date(gen);
    gen = d.getUTCFullYear() + '-'
      + String(d.getUTCMonth() + 1).padStart(2, '0') + '-'
      + String(d.getUTCDate()).padStart(2, '0') + ' '
      + String(d.getUTCHours()).padStart(2, '0') + ':'
      + String(d.getUTCMinutes()).padStart(2, '0') + ' UTC';
  } catch(e) {}

  var meta = '<p class="meta">'
    + 'Signal date: <strong>' + (data.signal_date || 'unknown') + '</strong>'
    + ' &nbsp;&middot;&nbsp; Generated: ' + gen + ' &nbsp;&middot;&nbsp; '
    + '<span class="badge badge-buy">' + buys.length + ' BUY</span> '
    + '<span class="badge badge-sell">' + sells.length + ' SELL</span> '
    + '<span class="badge badge-adj">' + adjusts.length + ' ADJUST</span> '
    + '<span class="badge badge-hold">' + holds.length + ' HOLD</span>'
    + '</p>';

  return meta
    + section('🟢 BUY — ' + buys.length + ' signals for next open', buyTable(buys))
    + section('🔴 SELL — ' + sells.length + ' closed today',         sellTable(sells))
    + section('🟣 ADJUST STOP — ' + adjusts.length + ' positions',  holdTable(adjusts))
    + section('🔵 HOLD — ' + holds.length + ' open positions',       holdTable(holds));
}

function loadDate(date) {
  document.getElementById('content').innerHTML = '<p class="empty">Loading…</p>';
  fetch('recs/' + date + '.json')
    .then(function(r) {
      if (!r.ok) throw new Error(r.statusText);
      return r.json();
    })
    .then(function(data) {
      document.getElementById('content').innerHTML = renderData(data);
    })
    .catch(function(e) {
      document.getElementById('content').innerHTML =
        '<p class="empty">Failed to load ' + date + ': ' + e.message + '</p>';
    });
}

fetch('manifest.json')
  .then(function(r) { return r.json(); })
  .then(function(dates) {
    var sel = document.getElementById('date-picker');
    sel.innerHTML = dates.map(function(d) {
      return '<option value="' + d + '">' + d + '</option>';
    }).join('');
    if (dates.length) loadDate(dates[0]);
  })
  .catch(function() {
    document.getElementById('content').innerHTML =
      '<p class="empty">Could not load manifest.json</p>';
  });
</script>
</body>
</html>
